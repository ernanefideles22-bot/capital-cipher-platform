name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  platform:
    name: Monorepo quality gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cipher
          POSTGRES_PASSWORD: cipher
          POSTGRES_DB: capital_cipher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cipher -d capital_cipher_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_TEST_URL: redis://localhost:6379/15
      POSTGRES_TEST_URL: postgresql+asyncpg://cipher:cipher@localhost:5432/capital_cipher_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - name: Install Python dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,postgres]"
      - name: Validate Supabase migrations on disposable PostgreSQL
        env:
          POSTGRES_MIGRATION_VALIDATION_URL: postgresql://cipher:cipher@localhost:5432/capital_cipher_test
          MIGRATION_VALIDATION_ACK: EPHEMERAL_TEST_DATABASE
        run: python backend/scripts/validate_supabase_migrations.py
      - name: Validate staging Compose
        env:
          STAGING_POSTGRES_PASSWORD: ci-postgres-abcdefghijklmnopqrstuvwxyz-012345
          STAGING_REDIS_PASSWORD: ci-redis-abcdefghijklmnopqrstuvwxyz-0123456789
          ADMIN_API_KEY: ci-admin-abcdefghijklmnopqrstuvwxyz-0123456789
        run: docker compose -f deploy/staging/compose.yml config --quiet
      - name: Build and preflight staging image
        env:
          STAGING_POSTGRES_PASSWORD: ci-postgres-abcdefghijklmnopqrstuvwxyz-012345
          STAGING_REDIS_PASSWORD: ci-redis-abcdefghijklmnopqrstuvwxyz-0123456789
          ADMIN_API_KEY: ci-admin-abcdefghijklmnopqrstuvwxyz-0123456789
        run: |
          docker compose -f deploy/staging/compose.yml build preflight
          docker compose -f deploy/staging/compose.yml run --rm --no-deps preflight
      - name: Validate hosted staging contract
        env:
          DATABASE_URL: "postgresql+asyncpg://capital_cipher_staging.phkligpkcitbbefrrotk:ci-database-abcdefghijklmnopqrstuvwxyz-012345@aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=verify-full&sslrootcert=/run/secrets/supabase-ca.crt"
          REDIS_URL: "rediss://default:ci-redis-abcdefghijklmnopqrstuvwxyz-0123456789@redis-staging.example.invalid:6379/0"
          SUPABASE_CA_CERT_HOST_PATH: /etc/ssl/certs/ca-certificates.crt
          STAGING_EXPECTED_REDIS_HOST: redis-staging.example.invalid
          ADMIN_API_KEY: ci-admin-abcdefghijklmnopqrstuvwxyz-0123456789
          STAGING_CORS_ALLOWED_ORIGINS: https://staging.example.invalid
          STAGING_BACKEND_IMAGE: capital-cipher-backend:staging
        run: |
          docker compose -f deploy/staging/compose.hosted.yml config --quiet
          docker compose -f deploy/staging/compose.hosted.yml run --rm --no-deps preflight
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build, typecheck, and test all packages
        run: pnpm check
      - name: Build hosted PAPER image with dashboard
        run: docker build --file deploy/fly/Dockerfile --tag capital-cipher-paper-image:ci .
