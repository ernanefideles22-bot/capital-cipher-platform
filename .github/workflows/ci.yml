name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  platform:
    name: Monorepo quality gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cipher
          POSTGRES_PASSWORD: cipher
          POSTGRES_DB: capital_cipher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cipher -d capital_cipher_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_TEST_URL: redis://localhost:6379/15
      POSTGRES_TEST_URL: postgresql+asyncpg://cipher:cipher@localhost:5432/capital_cipher_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install Python dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,postgres]"
      - name: Validate Supabase migrations on disposable PostgreSQL
        env:
          POSTGRES_MIGRATION_VALIDATION_URL: postgresql://cipher:cipher@localhost:5432/capital_cipher_test
          MIGRATION_VALIDATION_ACK: EPHEMERAL_TEST_DATABASE
        run: python backend/scripts/validate_supabase_migrations.py
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build, typecheck, and test all packages
        run: pnpm check
